services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: careerk-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-careerk}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-careerk_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_HOST: redis
      QUEUE_PORT: 6379
      NLP_API_URL: ${NLP_API_URL:-http://host.docker.internal:8000}
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  postgres:
    image: postgres:18-alpine
    container_name: careerk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-careerk_db}
      POSTGRES_USER: ${POSTGRES_USER:-careerk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - careerk-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 60s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: careerk-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --appendfsync everysec
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - '6379:6379'
    volumes:
      - careerk-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 30s
      timeout: 3s
      retries: 5

volumes:
  careerk-pgdata:
  careerk-redis-data:
